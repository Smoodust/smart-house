{{- if .Values.testHub.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "smart-house.fullname" . }}-test-hub
  labels:
    {{- include "smart-house.labels" . | nindent 4 }}
    app.kubernetes.io/component: test-hub
spec:
  backoffLimit: {{ .Values.testHub.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "smart-house.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: test-hub
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "smart-house.fullname" . }}-backend {{ .Values.backend.service.port }}; do echo waiting for backend; sleep 5; done
        - name: wait-for-bridge
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "smart-house.fullname" . }}-bridge {{ .Values.bridge.service.port }}; do echo waiting for bridge; sleep 5; done
      containers:
        - name: test-hub
          image: {{ .Values.testHub.image.repository }}:{{ .Values.testHub.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "smart-house.fullname" . }}-config
            - secretRef:
                name: {{ include "smart-house.fullname" . }}-secret
{{- end }}
