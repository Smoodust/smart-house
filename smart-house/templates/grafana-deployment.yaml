apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smart-house.fullname" . }}-grafana
  labels:
    {{- include "smart-house.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
spec:
  replicas: {{ .Values.grafana.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "smart-house.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: grafana
  template:
    metadata:
      labels:
        {{- include "smart-house.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image.repository }}:{{ .Values.grafana.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.grafana.containerPort }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "smart-house.fullname" . }}-secret
                  key: GRAFANA_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "smart-house.fullname" . }}-secret
                  key: GRAFANA_ADMIN_PASSWORD
          volumeMounts:
            - name: grafana-datasource
              mountPath: /etc/grafana/provisioning/datasources/datasource.yaml
              subPath: datasource.yaml
            - name: grafana-data
              mountPath: /var/lib/grafana
      volumes:
        - name: grafana-datasource
          configMap:
            name: {{ include "smart-house.fullname" . }}-grafana-datasource
        - name: grafana-data
          emptyDir: {}
