apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "smart-house.fullname" . }}-kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: "{{ .Values.kafkaCustom.image.repository }}:{{ .Values.kafkaCustom.image.tag }}"
          ports:
            - containerPort: 9092
            - containerPort: 9093

          command:
            - bash
            - -c
            - |
              if [ ! -f /var/lib/kafka/data/meta.properties ]; then
                /opt/kafka/bin/kafka-storage.sh format \
                -t kraft-cluster-1 \
                -c /opt/kafka/config/kraft/server.properties;
              fi

              /opt/kafka/bin/kafka-server-start.sh \
              /opt/kafka/config/kraft/server.properties

          volumeMounts:
            - name: kafka-config
              mountPath: /opt/kafka/config/kraft/server.properties
              subPath: server.properties

      volumes:
        - name: kafka-config
          configMap:
            name: {{ include "smart-house.fullname" . }}-kafka-config