{{- if .Values.liquibase.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "smart-house.fullname" . }}-liquibase
  labels:
    {{- include "smart-house.labels" . | nindent 4 }}
    app.kubernetes.io/component: liquibase
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.liquibase.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.liquibase.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "smart-house.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: liquibase
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "smart-house.fullname" . }}-postgresql 5432; do echo waiting for postgres; sleep 5; done
      containers:
        - name: liquibase
          image: {{ .Values.liquibase.image.repository }}:{{ .Values.liquibase.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - liquibase
          args:
            - --url=jdbc:postgresql://{{ include "smart-house.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}
            - --username={{ .Values.postgresql.auth.username }}
            - --password={{ .Values.postgresql.auth.password }}
            - --changeLogFile=db.changelog-master.yaml
            - update
          volumeMounts:
            - name: liquibase-changelog
              mountPath: /liquibase/changelog
      volumes:
        - name: liquibase-changelog
          configMap:
            name: {{ include "smart-house.fullname" . }}-liquibase-changelog
{{- end }}
