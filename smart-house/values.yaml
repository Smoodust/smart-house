nameOverride: ""
fullnameOverride: ""

commonLabels:
  app.kubernetes.io/part-of: smart-house

global:
  imagePullPolicy: IfNotPresent
  timezone: Europe/Moscow
  jwtSecret: oinf89ihldfslkjw

postgresql:
  enabled: true
  auth:
    username: myuser
    password: mypassword
    database: mydatabase
    postgresPassword: postgrespassword
  primary:
    persistence:
      enabled: false

kafkaCustom:
  image:
    repository: apache/kafka
    tag: 3.7.2

  service:
    port: 9092

  storagePath: /var/lib/kafka/data

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: smart-house-backend
    tag: dev
  auth:
    weatherApiKey: mykey
    mosquittoAdminUser: iambridginit
    mosquittoAdminPassword: Tw21#_$5g(9\
  containerPort: 8080
  service:
    type: ClusterIP
    port: 8080
  probes:
    path: /actuator/health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

bridge:
  enabled: true
  replicaCount: 1
  image:
    repository: smart-house-bridge
    tag: dev
  containerPort: 8080
  service:
    type: ClusterIP
    port: 8080
  probes:
    path: /actuator/health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  env:
    springProfilesActive: k8s
    KAFKA_BOOTSTRAP_SERVERS: smart-house-kafka:9092
    MQTT_BROKER: tcp://smart-house-mosquitto:1883
    MQTT_USERNAME: iambridginit
    MQTT_PASSWORD: Tw21#_$5g(9\

mosquitto:
  enabled: true
  replicaCount: 1
  image:
    repository: iegomez/mosquitto-go-auth
    tag: 3.0.0-mosquitto_2.0.18
  containerPort: 1883
  service:
    type: ClusterIP
    port: 1883

kafkaUi:
  enabled: false
  replicaCount: 1
  image:
    repository: provectuslabs/kafka-ui
    tag: latest
  containerPort: 8080
  service:
    type: ClusterIP
    port: 8080

prometheus:
  enabled: true
  replicaCount: 1
  image:
    repository: prom/prometheus
    tag: v3.11.3-distroless
  containerPort: 9090
  service:
    type: ClusterIP
    port: 9090
  storage:
    enabled: false
    size: 1Gi

grafana:
  enabled: true
  replicaCount: 1
  image:
    repository: grafana/grafana
    tag: latest
  containerPort: 3000
  service:
    type: ClusterIP
    port: 3000

liquibase:
  enabled: false
  image:
    repository: liquibase/liquibase
    tag: 4.33-alpine
  backoffLimit: 3
  ttlSecondsAfterFinished: 300

testHub:
  enabled: false
  image:
    repository: smart-house-test-hub
    tag: dev
  backoffLimit: 1
